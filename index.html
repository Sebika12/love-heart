<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Heart Loop</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

// Heart equation
function heart(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x, y};
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4d6d";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";

    let scale = 15;

    for (let i = 0; i < Math.PI * 2; i += 0.15) {
        let p = heart(i);

        let x = canvas.width / 2 + p.x * scale;
        let y = canvas.height / 2 - p.y * scale;

        // animated offset (makes it loop / move)
        let offset = Math.sin(t + i) * 10;

        ctx.fillText("I Love You", x + offset, y + offset);
    }

    t += 0.05; // speed of animation
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
